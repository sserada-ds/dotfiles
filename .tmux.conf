# ========== パフォーマンス最適化 ==========
# Vimモード切替の遅延をゼロに（Neovimユーザーには必須）
set -s escape-time 0

# スクロールバック履歴を大幅に増加（デフォルト2000→50000行）
set -g history-limit 50000

# ステータスバー更新頻度（デフォルト15秒→5秒）
set -g status-interval 5

# マルチモニター対応（アクティブウィンドウ以外を縮小）
setw -g aggressive-resize on

# ========== 番号付け改善 ==========
# ウィンドウ番号を1から開始（0は遠い）
set -g base-index 1

# ペイン番号を1から開始
setw -g pane-base-index 1

# ウィンドウ番号を自動リナンバー（削除時に詰める）
set -g renumber-windows on

# ========== プレフィックスキー ==========
# デフォルトのC-bからC-tに変更
set-option -g prefix C-t
unbind-key C-b
bind-key C-t send-prefix

# マウスモード
# マウスでのペイン選択・リサイズを有効化
set-option -g mouse on

# カラー設定
# 256色表示を有効にする
set-option -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# キーバインド
# `v`で左右分割、`s`で上下分割
bind v split-window -h
bind s split-window -v

# `C-`と`hjkl`でペインを移動する
bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R

# ========== Vi copy-mode設定 ==========
# Copy modeでViキーバインドを使用
setw -g mode-keys vi

# Vimライクな選択開始/コピー
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'

# Copy modeに素早く入る
bind Escape copy-mode

# ========== 便利なキーバインド ==========
# 設定ファイルリロード
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 分割時に現在のパスを引き継ぐ（既存のv/sを上書き）
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# 新規ウィンドウ作成時に現在のパスを引き継ぐ
bind c new-window -c "#{pane_current_path}"

# ペイン最大化トグル
bind m resize-pane -Z

# 最後のウィンドウに移動
bind Tab last-window

# ペインリサイズ
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# fzf連携 (ポップアップウィンドウ)
# prefix + F: セッションを選択
bind-key F display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | fzf --reverse | xargs tmux switch-client -t"

# prefix + W: ウィンドウを選択
bind-key W display-popup -E "tmux list-windows -a | fzf --reverse | cut -d: -f1 | xargs tmux select-window -t"

# prefix + P: ペインを選択
bind-key P display-popup -E "tmux list-panes -a | fzf --reverse | cut -d: -f1 | xargs tmux select-pane -t"

# ========== プラグインリスト ==========
set -g @plugin 'tmux-plugins/tpm'                  # Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tmux-sensible'        # 常識的なデフォルト設定
set -g @plugin 'tmux-plugins/tmux-resurrect'       # セッションの保存と復元
set -g @plugin 'tmux-plugins/tmux-continuum'       # セッションの自動保存と自動復元
set -g @plugin 'tmux-plugins/tmux-yank'            # OSクリップボード連携
set -g @plugin 'tmux-plugins/tmux-open'            # URLやファイルパスを開く
set -g @plugin 'wfxr/tmux-power'                   # パワーライン風テーマ
set -g @plugin 'tmux-plugins/tmux-cpu'             # CPU使用率表示
set -g @plugin 'sainnhe/tmux-fzf'                  # 統合fzf管理UI（プレビュー、複数選択対応）
set -g @plugin 'fcsonline/tmux-thumbs'             # 高速テキスト選択（URL、パス、Git SHAなど）
set -g @plugin '27medkamal/tmux-session-wizard'    # zoxide統合セッション管理
set -g @plugin 'laktak/extrakto'                   # ターミナル出力からテキスト抽出
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # プレフィックスキー入力状態を視覚化
set -g @plugin 'tmux-plugins/tmux-battery'         # バッテリー残量表示

# ========== プラグイン設定 ==========
# tmux-power: パワーライン風テーマ設定
set -g @tmux_power_theme 'forest'  # gold/redwine/moon/forest/violet/snow/coral/sky
set -g @tmux_power_date_format '%Y/%m/%d'
set -g @tmux_power_time_format '%H:%M'
set -g @tmux_power_show_upload_speed true
set -g @tmux_power_show_download_speed true
set -g @tmux_power_show_web_reachable true
set -g @tmux_power_right_arrow_icon ''
set -g @tmux_power_left_arrow_icon ''
set -g @tmux_power_upload_speed_icon '↑'
set -g @tmux_power_download_speed_icon '↓'
set -g @tmux_power_session_icon ''
set -g @tmux_power_user_icon ''
set -g @tmux_power_time_icon ''
set -g @tmux_power_date_icon ''

# tmux-fzf: 統合fzf管理UI
# 既存のprefix+Fと競合するため、prefix+Ctrl-fに変更
set -g @tmux-fzf-launch-key "C-f"
set -g @TMUX_FZF_OPTIONS "-p -w 80% -h 80% -m"
set -g @TMUX_FZF_ORDER "session|window|pane|command|keybinding|clipboard|process"

# tmux-session-wizard: zoxide統合セッション管理
# prefix + T で起動
set -g @session-wizard 'T'

# tmux-thumbs: テキスト選択設定
set -g @thumbs-key Space
set -g @thumbs-alphabet colemak-homerow  # または qwerty-homerow
set -g @thumbs-reverse enabled
set -g @thumbs-unique enabled

# extrakto: テキスト抽出設定
# prefix + tab で起動（デフォルト）
set -g @extrakto_split_size "15"
set -g @extrakto_clip_tool "pbcopy"  # macOS用（Linuxは"xclip -selection clipboard"）
set -g @extrakto_fzf_tool "fzf"

# tmux-prefix-highlight: プレフィックス表示設定
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=yellow,bold'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'

# tmux-battery: バッテリー表示設定
set -g @batt_icon_status_charged '🔋'
set -g @batt_icon_status_charging '⚡'
set -g @batt_icon_status_discharging '🔋'

# ========== その他設定 ==========
# フォーカスイベントを有効化（Vim/Neovimとの連携）
set -g focus-events on

# メッセージ表示時間を延長（デフォルト750ms→4秒）
set -g display-time 4000

# ========== プラグインマネージャー初期化 ==========
# この行は必ず最後に記述すること
run '~/.tmux/plugins/tpm/tpm'
